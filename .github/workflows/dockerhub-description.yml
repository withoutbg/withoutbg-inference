name: Docker Hub descriptions

# Updating repo README/short description requires a Docker Hub PAT with
# Read + Write + Delete scope (admin). Push-only tokens get 403 Forbidden.
# Use DOCKERHUB_DESCRIPTION_TOKEN, or upgrade DOCKERHUB_TOKEN with Delete scope.
on:
  workflow_dispatch:
  workflow_call:
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_DESCRIPTION_TOKEN:
        required: false
      DOCKERHUB_TOKEN:
        required: false
  push:
    branches: [main]
    paths:
      - "docker/hub/**"
      - ".github/workflows/dockerhub-description.yml"

jobs:
  update:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: service-cpu
            short-description: Self-hosted withoutBG v3 background removal API (CPU, ONNX, FastAPI).
          - image: service-gpu
            short-description: Self-hosted withoutBG v3 background removal API (GPU, CUDA, FastAPI).
          - image: app-cpu
            short-description: Self-hosted withoutBG background removal web app + API (CPU, open weights v3).
          - image: app-gpu
            short-description: Self-hosted withoutBG background removal web app + API (GPU, open weights v3).
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Hub credentials
        env:
          DH_PASSWORD: ${{ secrets.DOCKERHUB_DESCRIPTION_TOKEN || secrets.DOCKERHUB_TOKEN }}
        run: |
          if [[ -z "$DH_PASSWORD" ]]; then
            echo "::error::Missing Docker Hub token. Add DOCKERHUB_DESCRIPTION_TOKEN or DOCKERHUB_TOKEN (Read/Write/Delete scope) to repo secrets."
            exit 1
          fi

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_DESCRIPTION_TOKEN || secrets.DOCKERHUB_TOKEN }}
          repository: withoutbg/withoutbg-openweights-v3-${{ matrix.image }}
          readme-filepath: ./docker/hub/${{ matrix.image }}.md
          short-description: ${{ matrix.short-description }}
          enable-url-completion: true
